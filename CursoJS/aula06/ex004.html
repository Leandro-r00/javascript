<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS - Formatações de Strings</title>
    <style>
        body {
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual é o seu nome? ')
        document.write(`Olá, ${nome}! Seu nome tem ${nome.length} letras!<br>`)
        document.writeln(`Seu nome todo em caixa alta, fica assim: ${nome.toUpperCase()}!`)
        document.write(`Seu nome todo em caixa alta, fica assim: ${nome.toLowerCase()}!`)
    </script>
</body>
</html>
